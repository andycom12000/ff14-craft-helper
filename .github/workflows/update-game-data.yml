name: Update Game Data

on:
  schedule:
    - cron: '0 2 * * 0'   # Sunday 02:00 UTC (Taiwan 10:00)
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-game-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Restore datamining cache
        uses: actions/cache@v5
        with:
          path: .data-cache
          key: data-cache-v1-${{ github.run_id }}
          restore-keys: |
            data-cache-v1-

      - name: Build game data
        run: npm run build-game-data

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet public/data/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run tests (verify data integrates)
        if: steps.diff.outputs.changed == 'true'
        run: npm run test

      - name: Build (verify data integrates)
        if: steps.diff.outputs.changed == 'true'
        run: npm run build

      - name: Create Pull Request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/update-game-data
          delete-branch: true
          commit-message: 'chore(data): update game data'
          title: 'chore(data): update game data'
          body: |
            Auto-generated by the `update-game-data` workflow.

            Sources (exact commits in `public/data/manifest.json`):
            - harukaxxxx/ffxiv-datamining-tw (zh-TW)
            - thewakingsands/ffxiv-datamining-cn (zh-CN)
            - xivapi/ffxiv-datamining (en / ja / recipes / RLT)

            Tests & build verified in this workflow before PR creation.
            Merging triggers normal deploy on the next tag.

            Review checklist:
            - [ ] `public/data/manifest.json` commit hashes look reasonable
            - [ ] CI build status green
            - [ ] Optional: pull branch locally and spot-check a recipe in dev
          labels: |
            data-update
            automated
          add-paths: |
            public/data/**
