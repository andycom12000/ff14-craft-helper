<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Toast slice silhouette: arched crust top, flat bottom -->
  <path
    d="M 12 54 L 12 24 Q 12 8 32 8 Q 52 8 52 24 L 52 54 Q 52 56 50 56 L 14 56 Q 12 56 12 54 Z"
    fill="url(#toastFill)"
    stroke="#824020"
    stroke-width="2.5"
    stroke-linejoin="round"
  />
  <!-- Soft highlight along the crust arch -->
  <path
    d="M 18 22 Q 32 12 46 22"
    fill="none"
    stroke="#FFFFFF"
    stroke-opacity="0.4"
    stroke-width="2.2"
    stroke-linecap="round"
  />
  <!-- Grill marks (toasted lines) -->
  <line x1="22" y1="34" x2="42" y2="34"
        stroke="#824020" stroke-opacity="0.55"
        stroke-width="2" stroke-linecap="round" />
  <line x1="22" y1="44" x2="42" y2="44"
        stroke="#824020" stroke-opacity="0.55"
        stroke-width="2" stroke-linecap="round" />
  <defs>
    <linearGradient id="toastFill" x1="32" y1="8" x2="32" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#D8AF66" />
      <stop offset="100%" stop-color="#B07A33" />
    </linearGradient>
  </defs>
</svg>
