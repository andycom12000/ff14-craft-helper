<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Crystal body -->
  <path d="M32 4 L48 20 L48 44 L32 60 L16 44 L16 20 Z" fill="url(#crystal)" stroke="#A78BFA" stroke-width="1.5"/>
  <!-- Crystal facet lines -->
  <path d="M32 4 L32 60" stroke="#C4B5FD" stroke-width="0.8" opacity="0.5"/>
  <path d="M16 20 L48 20" stroke="#C4B5FD" stroke-width="0.8" opacity="0.5"/>
  <path d="M16 44 L48 44" stroke="#C4B5FD" stroke-width="0.8" opacity="0.5"/>
  <path d="M32 4 L16 20 L32 32 L48 20 Z" fill="url(#facetTop)" opacity="0.4"/>
  <!-- Hammer overlay -->
  <rect x="29" y="16" width="6" height="28" rx="1.5" fill="url(#handle)" opacity="0.85"/>
  <rect x="22" y="14" width="20" height="10" rx="3" fill="url(#hammerHead)" opacity="0.9"/>
  <!-- Spark accents -->
  <circle cx="18" cy="14" r="1.5" fill="#FCD34D" opacity="0.8"/>
  <circle cx="46" cy="12" r="1" fill="#FCD34D" opacity="0.6"/>
  <circle cx="14" cy="28" r="1" fill="#FCD34D" opacity="0.5"/>
  <!-- Gradients -->
  <defs>
    <linearGradient id="crystal" x1="16" y1="4" x2="48" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="50%" stop-color="#6D28D9"/>
      <stop offset="100%" stop-color="#4C1D95"/>
    </linearGradient>
    <linearGradient id="facetTop" x1="32" y1="4" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="handle" x1="32" y1="16" x2="32" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#D4A574"/>
      <stop offset="100%" stop-color="#92643A"/>
    </linearGradient>
    <linearGradient id="hammerHead" x1="22" y1="14" x2="42" y2="24" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E5E7EB"/>
      <stop offset="100%" stop-color="#9CA3AF"/>
    </linearGradient>
  </defs>
</svg>
